<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外出登記表</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background-color: #f0f0f0; /* 將背景設為淺灰色，幫助確認 iframe 是否有載入 */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block; /* 確保 iframe 是區塊元素 */
        }
    </style>
</head>
<body>
    <!-- 1. 我們將 /pubembed 手動改回原本能用的 /embed -->
    <!-- 2. 我加上了一個簡單的 ID（myIframe）方便 JavaScript 抓取 -->
    <iframe 
        id="myIframe"
        src="https://docs.google.com/presentation/d/e/2PACX-1vQDrQd-jE4o87RzplL3IRXqyH5yjoMZIQoXQ9yeWtq2TdWvamf1Lhsx7gylNMuNsso-DNIsAMckbZ2_/embed?start=false&loop=false&delayms=3000" 
        allowfullscreen="true" 
        mozallowfullscreen="true" 
        webkitallowfullscreen="true">
    </iframe>

    <script>
        function refreshIframe() {
            if (navigator.onLine) {
                const iframe = document.getElementById("myIframe");
                
                // 3. 我們把自動重新整理的機制變得更簡單直接
                // 加上 t= 時間戳記，強迫它不讀取快取
                const currentSrc = new URL(iframe.src);
                currentSrc.searchParams.set('t', new Date().getTime());
                
                iframe.src = currentSrc.toString();
                console.log("已自動刷新");
            }
        }

        // 依然設定為 60 秒刷新一次
        setInterval(refreshIframe, 60000); 

        // 斷線重連後立即刷新
        window.addEventListener('online', refreshIframe);
    </script>
</body>
</html>
