<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外出登記表</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none; /* 移除邊框 */
        }
    </style>
</head>
<body>
    <iframe 
        id="googleSlides" 
        src="https://docs.google.com/presentation/d/e/2PACX-1vQDrQd-jE4o87RzplL3IRXqyH5yjoMZIQoXQ9yeWtq2TdWvamf1Lhsx7gylNMuNsso-DNIsAMckbZ2_/pub?start=false&loop=false" 
        allowfullscreen="true" 
        mozallowfullscreen="true" 
        webkitallowfullscreen="true">
    </iframe>
    
    <script>
        function refreshIframe() {
            const iframe = document.getElementById("googleSlides");
            
            // 原始簡報網址 (已改為 /pub 模式)
            const baseUrl = "https://docs.google.com/presentation/d/e/2PACX-1vQDrQd-jE4o87RzplL3IRXqyH5yjoMZIQoXQ9yeWtq2TdWvamf1Lhsx7gylNMuNsso-DNIsAMckbZ2_/pub?start=false&loop=false";
            
            // 加上時間戳記，避免電視瀏覽器讀取到舊快取
            const timestamp = new Date().getTime();
            iframe.src = baseUrl + "&t=" + timestamp;
            
            console.log("Iframe refreshed at: " + new Date().toLocaleTimeString());
        }

        // 設為每 1 分鐘 (60000 毫秒) 刷新一次
        setInterval(refreshIframe, 60000);
    </script>
</body>
</html>
