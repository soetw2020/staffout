<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外出登記表</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none; /* 移除邊框 */
        }
    </style>
</head>
<body>
    <iframe 
        id="googleSlides" 
        src="https://docs.google.com/presentation/d/e/2PACX-1vQDrQd-jE4o87RzplL3IRXqyH5yjoMZIQoXQ9yeWtq2TdWvamf1Lhsx7gylNMuNsso-DNIsAMckbZ2_/embed?start=false&loop=false&delayms=3000" 
        allowfullscreen="true" 
        mozallowfullscreen="true" 
        webkitallowfullscreen="true">
    </iframe>
    <script>
        function refreshIframe() {
            const iframe = document.getElementById("googleSlides");
            
            // 您的原始網址（我把 delayms 拿掉了，因為你不需要它自動播放幻燈片）
            const baseUrl = "https://docs.google.com/presentation/d/e/2PACX-1vQDrQd-jE4o87RzplL3IRXqyH5yjoMZIQoXQ9yeWtq2TdWvamf1Lhsx7gylNMuNsso-DNIsAMckbZ2_/embed?start=false&loop=false";
            
            // 加上當下時間戳記，騙過 BrowserHere 的快取機制
            const timestamp = new Date().getTime();
            iframe.src = baseUrl + "&t=" + timestamp;
            
            console.log("Iframe refreshed at: " + new Date().toLocaleTimeString());
        }

        // 設為每 3 分鐘 (180000 毫秒) 刷新一次。若要 5 分鐘請改成 300000
        setInterval(refreshIframe, 180000);
    </script>
</body>
</html>
