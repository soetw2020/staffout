<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>外出登記表</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- 關鍵：改用 /embed 格式，這是針對 Browserhere 最穩定的格式 -->
    <iframe 
        id="googleSlides" 
        src="https://docs.google.com/presentation/d/e/2PACX-1vQDrQd-jE4o87RzplL3IRXqyH5yjoMZIQoXQ9yeWtq2TdWvamf1Lhsx7gylNMuNsso-DNIsAMckbZ2_/embed?start=true&loop=true&delayms=60000" 
        allowfullscreen="true">
    </iframe>

    <script>
        function refreshIframe() {
            if (navigator.onLine) {
                const iframe = document.getElementById("googleSlides");
                // 重新設定 src 並加上時間標籤 t，強制 Browserhere 抓取最新內容
                const baseUrl = "https://docs.google.com/presentation/d/e/2PACX-1vQDrQd-jE4o87RzplL3IRXqyH5yjoMZIQoXQ9yeWtq2TdWvamf1Lhsx7gylNMuNsso-DNIsAMckbZ2_/embed?start=true&loop=true&delayms=60000";
                iframe.src = baseUrl + "&t=" + new Date().getTime();
            }
        }

        // 每 60 秒 (1分鐘) 自動重載一次
        setInterval(refreshIframe, 60000);
    </script>
</body>
</html>
