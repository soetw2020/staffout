<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>外出登記表</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe 
        id="googleSlides" 
        src="https://docs.google.com/presentation/d/e/2PACX-1vQDrQd-jE4o87RzplL3IRXqyH5yjoMZIQoXQ9yeWtq2TdWvamf1Lhsx7gylNMuNsso-DNIsAMckbZ2_/embed?start=true&loop=true&delayms=60000" 
        allowfullscreen="true">
    </iframe>

    <script>
        function refreshEntirePage() {
            // 不再只刷新 iframe，而是直接刷新整個 StaffOut.html 網頁
            // 這是對 Browserhere 最保險的做法，能解決連線逾時導致的黑屏
            location.reload(true); 
        }

        // 每 60 秒刷新一次 (60000 毫秒)
        setInterval(refreshEntirePage, 60000);
    </script>
</body>
</html>
