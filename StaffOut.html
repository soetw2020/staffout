<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外出登記表</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background-color: black; /* 加上黑色底色，避免白邊刺眼 */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* 確保圖片完美比例塞滿螢幕 */
        }
    </style>
</head>
<body>
    <img id="slideImage" src="" alt="外出登記表載入中...">
    
    <script>
        // 已經幫您替換成您專屬的檔案 ID
        const fileId = "1gJu1eTCmuMhoZV9zSkAo7fecyhjYrFwzx98znT0KWCs"; 
        
        // 呼叫 Google 隱藏版 API：強制將簡報輸出成 PNG 圖片
        const baseUrl = "https://docs.google.com/presentation/d/" + fileId + "/export/png";

        function refreshImage() {
            const img = document.getElementById("slideImage");
            
            // 加上時間戳記，強迫電視去抓最新的圖片
            const timestamp = new Date().getTime();
            img.src = baseUrl + "?t=" + timestamp;
            
            console.log("Image refreshed at: " + new Date().toLocaleTimeString());
        }

        // 網頁一打開先執行一次載入圖片
        refreshImage();

        // 設為每 1 分鐘 (60000 毫秒) 刷新一次圖片
        setInterval(refreshImage, 60000);
    </script>
</body>
</html>
