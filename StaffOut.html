<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>外出登記表 (1分鐘強制更新版)</title>
    <style>
        html, body { margin: 0; height: 100%; overflow: hidden; background-color: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <!-- 使用您剛取得的連結，並將 start 改為 true -->
    <iframe 
        id="googleSlides"
        src="https://docs.google.com/presentation/d/e/2PACX-1vQDrQd-jE4o87RzplL3IRXqyH5yjoMZIQoXQ9yeWtq2TdWvamf1Lhsx7gylNMuNsso-DNIsAMckbZ2_/pub?start=true&loop=true&delayms=60000" 
        allowfullscreen="true">
    </iframe>

    <script>
        function forceUpdate() {
            const iframe = document.getElementById("googleSlides");
            const originalSrc = "https://docs.google.com/presentation/d/e/2PACX-1vQDrQd-jE4o87RzplL3IRXqyH5yjoMZIQoXQ9yeWtq2TdWvamf1Lhsx7gylNMuNsso-DNIsAMckbZ2_/pub?start=true&loop=true&delayms=60000";
            
            console.log("正在嘗試強制更新...");
            
            // 1. 先將 iframe 的 src 清空為空白，強迫瀏覽器釋放記憶體和舊連線
            iframe.src = ""; 
            
            // 2. 延遲 500 毫秒後，再重新設定新的 src
            // 加入時間戳記 (t)，強迫 Google 伺服器回傳最新版本而非快取
            setTimeout(() => {
                iframe.src = originalSrc + "&t=" + new Date().getTime();
                console.log("更新指令已發送");
            }, 500); 
        }

        // 每 60000 毫秒 (1分鐘) 執行一次強制更新
        setInterval(forceUpdate, 60000); 
    </script>
</body>
</html>
