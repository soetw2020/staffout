<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>外出登記表</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* 確保背景是黑色的 */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- 關鍵修正：必須使用 /embed 或 /pubembed 格式，不能使用 /pub -->
    <iframe 
        id="googleSlides" 
        src="https://docs.google.com/presentation/d/e/2PACX-1vQDrQd-jE4o87RzplL3IRXqyH5yjoMZIQoXQ9yeWtq2TdWvamf1Lhsx7gylNMuNsso-DNIsAMckbZ2_/embed?start=true&loop=true&delayms=60000" 
        allowfullscreen="true">
    </iframe>

    <script>
        function refreshIframe() {
            if (navigator.onLine) {
                const iframe = document.getElementById("googleSlides");
                // 在網址後加上隨機參數，強迫 Chromecast 抓取最新資料
                const currentUrl = "https://docs.google.com/presentation/d/e/2PACX-1vQDrQd-jE4o87RzplL3IRXqyH5yjoMZIQoXQ9yeWtq2TdWvamf1Lhsx7gylNMuNsso-DNIsAMckbZ2_/embed?start=true&loop=true&delayms=60000";
                iframe.src = currentUrl + "&t=" + new Date().getTime();
                console.log("已刷新資料");
            }
        }

        // 每 60 秒刷新一次，抓取最新外出資料
        setInterval(refreshIframe, 60000);
    </script>
</body>
</html>
