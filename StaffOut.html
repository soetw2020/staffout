<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外出登記表</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* 刷新過渡時背景設為黑色 */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- 使用您剛剛取得的 pubembed 網址 -->
    <iframe 
        id="googleSlides" 
        src="https://docs.google.com/presentation/d/e/2PACX-1vQDrQd-jE4o87RzplL3IRXqyH5yjoMZIQoXQ9yeWtq2TdWvamf1Lhsx7gylNMuNsso-DNIsAMckbZ2_/pubembed?start=false&loop=false&delayms=3000" 
        allowfullscreen="true" 
        mozallowfullscreen="true" 
        webkitallowfullscreen="true">
    </iframe>

    <script>
        function refreshIframe() {
            if (navigator.onLine) {
                const iframe = document.getElementById("googleSlides");
                // 取得原始網址
                const currentSrc = new URL(iframe.src);
                // 加上時間戳記 (t) 強制伺服器提供最新版本，避免快取錯誤
                currentSrc.searchParams.set('t', new Date().getTime());
                
                // 執行重新載入
                iframe.src = currentSrc.toString();
                console.log("已完成自動刷新：" + new Date().toLocaleTimeString());
            }
        }

        // 設定每 60 秒刷新一次 (60000 毫秒)
        setInterval(refreshIframe, 60000);

        // 監聽電腦從斷線恢復連線的瞬間，立即刷新畫面
        window.addEventListener('online', refreshIframe);
    </script>
</body>
</html>
